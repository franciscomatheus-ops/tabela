<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="stylesheet" href="./tb.css">
    <script src="./main.js"></script>
</head>
<body>
    <div class="pt_geral">
        <div class="pt_1">
            <span>Primeira Queda</span>
            <input type="number" value="0" maxlength="2" id="partida1" onblur="pt_1();final()">
            <input type="number" value="0" maxlength="2" id="kill1" onblur="pt_1();final()">
        </div>
        <div class="pt_1">
            <span>Segunda Queda</span>

        <div class="pt_1">

        </div>
    </div>
    <div class="tabela" id="pdf2htmldiv">
        <table id="demo">
            <tr>
                <th>Queda</th>
                <th>Posição</th>
                <th>Abates</th>
                <th>Resultado</th>
            </tr>
            <tr>
                <td>1º</td>
                <td id="p1">0</td>

                <td id="r1">0</td>
            </tr>
            <tr>
                <td>2º</td>
                <td id="p2">0</td>

                <td id="r2">0</td>
            </tr>
            <tr>
                <td >3º</td>
                <td id="p3">0</td>

                <td id="r3">0</td>
            </tr>
            <tr>

            </tr>
            <tr>

                <td id="r5">0</td>
            </tr>
        </table>
        <table class="tbl">
            <tr>
                <th>Resultado</th>
                <td id="resultado">0</td>
            </tr>
        </table>
    </div>
    <div class="btn">
        <input class="butao" type="button" onclick="printDiv('pdf2htmldiv')" value="Imprimir" />
    </div>
</body>
</html>
